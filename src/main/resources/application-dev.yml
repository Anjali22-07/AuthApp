server:
   port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/authapp

    username: ${DB_Username}
    password: ${DB_Password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:           # JPA and Hibernate configuration.
    hibernate:
      ddl-auto: update

    show-sql: true
    properties:
       hibernate:
         dialect: org.hibernate.dialect.MySQLDialect




